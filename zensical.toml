# ============================================================================
# GTFS Documentation Site Configuration
# ============================================================================

[project]
site_name = "Transit data in Python"
site_description = "Tutorials and guides for working with GTFS data in Python"
site_author = ""

# Navigation structure
nav = [
  { "Home" = "index.md" },
  { "Tutorials" = [
    { "Build a Realtime Bus Locations Dashboard" = [
      { "Introduction" = "tutorials/realtime-dashboard/index.md" },
      { "Set up your development environment" = "tutorials/realtime-dashboard/1-setup.md" },
      { "Fetch live transit data" = "tutorials/realtime-dashboard/2-fetch-data/index.md" },
      { "Parse real-time vehicle positions" = "tutorials/realtime-dashboard/3-parse-data/index.md" },
      { "Build an interactive dashboard" = "tutorials/realtime-dashboard/4-build-dashboard/index.md" },
      # { "Publish your app" = [
      #   { "Prepare for deployment" = "tutorials/realtime-dashboard/5-publish/1-prepare-deployment.md" },
      #   { "Deploy" = "tutorials/realtime-dashboard/5-publish/2-deploy.md" },
      # ]},
    ]},
  ]},
]

# Theme configuration
[project.theme]
language = "en"

features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Markdown extensions
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
