name: Build docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run Vale
        uses: vale-cli/vale-action@v2
        with:
          files: docs
          reporter: github-pr-check
          fail_on_error: true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 
      - run: uvx zensical@latest build
