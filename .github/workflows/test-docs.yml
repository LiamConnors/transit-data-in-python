name: Test documentation commands

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-commands:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # source: docs/tutorials/realtime-dashboard/1-setup.md
      - name: "Set up your development environment"
        run: |
          mkdir transit-dashboard
          cd transit-dashboard
          python3 -m venv .venv
          source .venv/bin/activate
          pip install requests gtfs-realtime-bindings dash

      # source: docs/tutorials/realtime-dashboard/2-fetch-data/index.md
      - name: "Fetch live transit data"
        run: |
          cd transit-dashboard
          source .venv/bin/activate
          export STM_API_KEY="test-key"
          python -c "import requests; print('requests OK')"
          python -c "from google.transit import gtfs_realtime_pb2; print('gtfs-realtime-bindings OK')"

      # source: docs/tutorials/realtime-dashboard/3-parse-data/index.md
      - name: "Parse real-time vehicle positions"
        run: |
          cd transit-dashboard
          source .venv/bin/activate
          export STM_API_KEY="test-key"
          python -c "from google.transit import gtfs_realtime_pb2; feed = gtfs_realtime_pb2.FeedMessage(); print('Parse OK')"
